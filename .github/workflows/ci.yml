name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      # We run verify to include the integration tests which use Testcontainers. 
      # GitHub actions ubuntu-latest has Docker pre-installed, so Testcontainers will work perfectly.
      run: mvn clean verify

    - name: Build Docker Images
      run: docker compose build
